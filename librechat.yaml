version: 1.2.8

cache: true

endpoints:
  azureOpenAI:
    groups:
      - group: "primary"
        apiKey: "${AZURE_OPENAI_KEY}"
        instanceName: "${AZURE_OPENAI_INSTANCE_NAME}"
        version: "${AZURE_OPENAI_API_VERSION}"
        models:
          gpt-4o:
            deploymentName: "${AZURE_OPENAI_DEPLOYMENT_4_o}"
          gpt-5.4-mini:
            deploymentName: "${AZURE_OPENAI_DEPLOYMENT_5_4_MINI}"
