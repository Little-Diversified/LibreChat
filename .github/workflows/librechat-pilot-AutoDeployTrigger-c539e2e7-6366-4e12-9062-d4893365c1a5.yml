name: Trigger auto deployment for librechat-pilot

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/librechat-pilot-AutoDeployTrigger-c539e2e7-6366-4e12-9062-d4893365c1a5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LIBRECHATPILOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LIBRECHATPILOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LIBRECHATPILOT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: littleregistry.azurecr.io
          registryUsername: ${{ secrets.LIBRECHATPILOT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LIBRECHATPILOT_REGISTRY_PASSWORD }}
          containerAppName: librechat-pilot
          resourceGroup: rg-librechat-pilot
          imageToBuild: littleregistry.azurecr.io/librechat-pilot:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


